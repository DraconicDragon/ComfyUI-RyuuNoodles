name: 📝 Generate Changelog

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["📌 Auto Tag from pyproject.toml"]
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch full history including tags
          fetch-tags: true

      - name: Get latest tag
        id: tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0)
          echo "Found tag: $latest_tag"
          echo "tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Exit if prerelease
        if: contains(steps.tag.outputs.tag, '-')
        run: |
          echo "Pre-release tag detected (${ { steps.tag.outputs.tag }}), skipping changelog."
          exit 0

      - name: Build Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          fromTag: ${{ steps.tag.outputs.tag }}
          toTag: ${{ steps.tag.outputs.tag }}
          mode: "COMMIT"
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                { "title": "## Feature", "labels": ["feat","feature"] },
                { "title": "## Fix",     "labels": ["fix","bug"]     },
                { "title": "## Other",   "labels": []               }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-.]+\\))?(!)?:",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save changelog to file
        run: echo "${{ steps.changelog.outputs.changelog }}" > CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
